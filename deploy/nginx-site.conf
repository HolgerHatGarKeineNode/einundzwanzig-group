ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_dhparam /etc/nginx/dhparams.pem;

add_header X-Frame-Options "SAMEORIGIN";
add_header X-XSS-Protection "1; mode=block";
add_header X-Content-Type-Options "nosniff";

charset utf-8;

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3277614/server/*;

# Hinweis: der server-Block (sites-available) setzt bereits einen `root` auf den
# zooid-Ordner — ein zweiter `root` hier wäre ein nginx-Fehler (duplicate). Der
# Web-Client-Webroot wird daher pro Laravel-Location gesetzt.

# ── zooid-Relay behält seine HTTP-Pfade (NICHT von Laravel übernehmen) ──────
# /static/            = Assets der Relay-Landing
# /.well-known/nip29/ = NIP-29 / LiveKit-Webhooks
location /static/ {
    proxy_pass http://127.0.0.1:3335;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /.well-known/nip29/ {
    proxy_pass http://127.0.0.1:3335;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Der Root: Nostr-Traffic → zooid, Browser-HTML → Laravel-Landing ─────────
# WebSocket-Upgrade (Relay) und NIP-11/NIP-86 (Accept: application/nostr+json)
# bleiben bei zooid; alles andere (normaler Browser-GET) rendert Laravel.
location = / {
    root /home/zooid/webclient/public;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;

    if ($http_upgrade)                             { proxy_pass http://127.0.0.1:3335; }
    if ($http_accept ~* "application/nostr\+json") { proxy_pass http://127.0.0.1:3335; }

    # Kein Nostr-Request → Laravel (REQUEST_URI bleibt "/").
    try_files /__laravel_root__ @laravel;
}

location @laravel {
    root /home/zooid/webclient/public;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    fastcgi_pass unix:/run/php/php8.4-fpm-zooid.sock;
}

# ── Übrige Laravel-Routen ───────────────────────────────────────────────────
location / {
    root /home/zooid/webclient/public;
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ \.php$ {
    root /home/zooid/webclient/public;
    include fastcgi_params;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php8.4-fpm-zooid.sock;
}

location = /favicon.ico { root /home/zooid/webclient/public; access_log off; log_not_found off; }
location = /favicon.svg { root /home/zooid/webclient/public; access_log off; log_not_found off; }
location = /robots.txt  { root /home/zooid/webclient/public; access_log off; log_not_found off; }

access_log off;
error_log  /var/log/nginx/3277614-error.log error;

location ~ /\.(?!well-known).* {
    deny all;
}
